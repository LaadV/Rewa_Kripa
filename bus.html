<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bus Details — Rewa Kripa Travels</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="site-header"></div>

<div class="bus-detail-hero">
  <img id="busImg" src="images/bus1.jpeg" alt="Bus">
</div>

<section class="bus-detail-body">
  <div class="container">
    <div class="bus-detail-layout">
      <div>
        <span class="bus-plate-tag" id="busPlate"></span>
        <h1 id="busTitle"></h1>
        <p class="bus-detail-desc" id="busDesc"></p>
        <div class="bus-specs-grid" id="busSpecs"></div>
        <p class="features-heading">On-board Amenities</p>
        <div class="features-list" id="busFeatures"></div>
      </div>
      <div>
        <div class="book-sidebar">
          <div class="book-sidebar-header">
            <h3>Book a Seat on This Bus</h3>
            <p>Instant confirmation via WhatsApp</p>
          </div>
          <div class="book-sidebar-body">
            <div class="book-price-display">
              <span class="big" id="busPrice"></span>
              <span class="per">per seat</span>
            </div>
            <div class="book-row"><span class="bl">Route</span><span class="bv" id="busRoute"></span></div>
            <div class="book-row"><span class="bl">Departure</span><span class="bv" id="busDep"></span></div>
            <div class="book-row"><span class="bl">Layout</span><span class="bv" id="busLayout"></span></div>
            <div class="book-row"><span class="bl">Capacity</span><span class="bv" id="busCap"></span></div>
            <div class="book-cta">
              <a id="busBookLink" href="book-seat.html" class="btn-primary" style="text-align:center;display:block;width:100%;padding:13px;">🎫 Choose Seat &amp; Book</a>
              <a id="busWALink" href="#" target="_blank" class="btn-whatsapp">💬 WhatsApp to Book</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<div id="site-footer"></div>
<script src="config.js"></script>
<script src="script.js"></script>
<script>
buildHeader('');
buildFooter();

var id = new URLSearchParams(window.location.search).get('bus') || CONFIG.buses[0].id;
var b  = getBus(id);

document.title = b.plate + ' — ' + CONFIG.company.fullName;
document.getElementById('busImg').src     = b.image;
document.getElementById('busImg').alt     = b.title;
document.getElementById('busPlate').textContent = b.plate;
document.getElementById('busTitle').textContent = b.title;
document.getElementById('busDesc').textContent  = b.description;
document.getElementById('busPrice').textContent = formatINR(b.price);
document.getElementById('busRoute').textContent = b.route;
document.getElementById('busDep').textContent   = b.departure;
document.getElementById('busLayout').textContent= b.layout;
document.getElementById('busCap').textContent   = b.capacity + ' Seats';

document.getElementById('busBookLink').href = 'book-seat.html?bus='+b.id;
document.getElementById('busWALink').href   = 'https://wa.me/'+CONFIG.company.whatsapp+'?text='+encodeURIComponent('Hi, I want to book a seat on bus '+b.plate+' ('+b.title+') on the route '+b.route+'.');

var specs = [
  { l:'Bus Number', v: b.plate   },
  { l:'Layout',     v: b.layout  },
  { l:'Capacity',   v: b.capacity+' Seats' },
  { l:'Climate',    v: b.climate },
  { l:'Type',       v: b.type    },
  { l:'Fare',       v: formatINR(b.price)+'/seat' }
];
document.getElementById('busSpecs').innerHTML = specs.map(function(s){
  return '<div class="spec-box"><span class="sl">'+s.l+'</span><span class="sv">'+s.v+'</span></div>';
}).join('');

document.getElementById('busFeatures').innerHTML = b.features.map(function(f){
  return '<div class="feat-item">'+f+'</div>';
}).join('');
</script>
</body>
</html>
