<html lang="en">

<body>
<div id="site-header"></div>

<script src="config.js"></script><script src="script.js"></script>
<script>
buildHeader('blog.html'); buildFooter();
var posts = [
  { img:'images/bus1.jpeg', tag:'Travel Guide', title:'Barwani to Indore by Bus: Everything You Need to Know in 2026', desc:'Complete guide to travelling from Barwani to Indore — timings, fares, boarding points, and comfort tips.', date:'March 15, 2026' },
  { img:'images/bus3.jpeg', tag:'Pilgrimage',   title:'Char Dham Yatra 2026: What to Pack, Expect, and Remember', desc:'Planning the Char Dham pilgrimage? Our comprehensive guide for first-time pilgrims — packing, health tips, temple timings.', date:'March 10, 2026' },
  { img:'images/bus2.jpeg', tag:'Hill Trips',   title:'Why Manali in May is Perfect for Barwani Travellers', desc:'May is the ideal month — fresh snow, pleasant weather, manageable crowds. Here is why you should book now.', date:'Feb 28, 2026' },

document.getElementById('blog-grid').innerHTML = posts.map(function(p){

}).join('');
</script>
</body></html>
