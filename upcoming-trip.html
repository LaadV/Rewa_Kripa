<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upcoming Trips — Rewa Kripa Travels</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="site-header"></div>

<section class="page-hero">
  <div class="container">
    <div class="page-eyebrow">Departures 2026</div>
    <h1>Upcoming Trips</h1>
    <p>Daily commutes, weekend getaways, and sacred pilgrimages — find your journey</p>
  </div>
</section>

<section class="trips-page-body">
  <div class="container">
    <div class="filter-bar">
      <button class="filter-btn active" data-filter="all">All Trips</button>
      <button class="filter-btn" data-filter="daily">Daily Routes</button>
      <button class="filter-btn" data-filter="leisure">Leisure</button>
      <button class="filter-btn" data-filter="spiritual">Pilgrimage</button>
    </div>
    <div class="upcoming-grid" id="trips-grid"></div>
  </div>
</section>

<div id="site-footer"></div>
<script src="config.js"></script>
<script src="script.js"></script>
<script>
buildHeader('upcoming-trip.html');
buildFooter();

// Badge → filter category map
var catMap = { popular:'leisure', trending:'leisure', spiritual:'spiritual', daily:'daily' };

document.getElementById('trips-grid').innerHTML = CONFIG.trips.map(function(t){
  var cat = catMap[t.badge] || 'leisure';
  return '<a href="trip-detail.html?trip='+t.id+'" class="upcoming-card" data-category="'+cat+'">'+
    '<div class="upcoming-card-img">'+
      '<img src="'+t.image+'" alt="'+t.shortTitle+'">'+
      '<span class="uc-badge '+badgeClass(t.badge)+'">'+t.badgeLabel+'</span>'+
      '<span class="uc-seats">'+t.seatsLeft+' seats left</span>'+
    '</div>'+
    '<div class="upcoming-card-body">'+
      '<h3>'+t.title+'</h3>'+
      '<p class="uc-desc">'+t.subtitle+'</p>'+
      '<div class="uc-meta">'+
        '<div class="uc-meta-item"><span class="ul">Departs</span><span class="uv">'+t.departure+'</span></div>'+
        '<div class="uc-meta-item"><span class="ul">Returns</span><span class="uv">'+t.returnDate+'</span></div>'+
        '<div class="uc-meta-item"><span class="ul">Duration</span><span class="uv">'+t.duration+'</span></div>'+
      '</div>'+
      '<div class="uc-footer">'+
        '<div class="uc-price">'+formatINR(t.price)+' <small>/person</small></div>'+
        '<span class="btn-primary" style="padding:9px 16px;font-size:13px;">View Trip</span>'+
      '</div>'+
    '</div>'+
    '</a>';
}).join('');

// Also add daily routes from config
var dailyHTML = CONFIG.routes.map(function(r){
  return '<a href="book-seat.html?route='+r.id+'" class="upcoming-card" data-category="daily">'+
    '<div class="upcoming-card-img">'+
      '<img src="'+r.image+'" alt="'+r.label+'">'+
      '<span class="uc-badge badge-daily">🚌 Daily</span>'+
      '<span class="uc-seats">Available</span>'+
    '</div>'+
    '<div class="upcoming-card-body">'+
      '<h3>'+r.label+'</h3>'+
      '<p class="uc-desc">'+r.type+'. Comfortable and on-time every day.</p>'+
      '<div class="uc-meta">'+
        '<div class="uc-meta-item"><span class="ul">First Bus</span><span class="uv">'+r.firstBus+'</span></div>'+
        '<div class="uc-meta-item"><span class="ul">Last Bus</span><span class="uv">'+r.lastBus+'</span></div>'+
        '<div class="uc-meta-item"><span class="ul">Duration</span><span class="uv">'+r.duration+'</span></div>'+
      '</div>'+
      '<div class="uc-footer">'+
        '<div class="uc-price">'+formatINR(r.price)+' <small>/seat</small></div>'+
        '<span class="btn-primary" style="padding:9px 16px;font-size:13px;">Book Seat</span>'+
      '</div>'+
    '</div>'+
    '</a>';
}).join('');

document.getElementById('trips-grid').innerHTML += dailyHTML;
</script>
</body>
</html>
