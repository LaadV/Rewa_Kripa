<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cancellation Policy — Rewa Kripa Travels</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css"></head>
<body>
<div id="site-header"></div>
<section class="page-hero"><div class="container"><div class="page-eyebrow">Legal · India</div><h1>Cancellation &amp; Refund Policy</h1><p>Effective Date: 1 April 2026</p></div></section>
<section class="policy-body"><div class="container"><div class="policy-content" id="pol-content"></div></div></section>
<div id="site-footer"></div>
<script src="config.js"></script><script src="script.js"></script>
<script>
buildHeader(''); buildFooter();
var c = CONFIG.company;
document.getElementById('pol-content').innerHTML =
  '<p class="policy-date">Complies with Consumer Protection Act, 2019 (India). Binding on all bookings with '+c.fullName+', '+c.address.line1+', '+c.address.city+' — '+c.address.pin+'.</p>'+
  '<h2>1. Regular Seat Cancellations</h2><ul><li><strong>48+ hours before departure:</strong> 90% refund.</li><li><strong>24–48 hours before:</strong> 50% refund.</li><li><strong>Less than 24 hours:</strong> No refund. Ticket may be rescheduled once free of charge (subject to availability).</li><li><strong>No-show:</strong> No refund.</li></ul>'+
  '<h2>2. Tour Package Cancellations</h2><ul><li><strong>15+ days before:</strong> 75% refund.</li><li><strong>8–14 days before:</strong> 50% refund.</li><li><strong>3–7 days before:</strong> 25% refund.</li><li><strong>Less than 72 hours:</strong> No refund. Booking may be transferred to another person (with ID).</li></ul>'+
  '<h2>3. How to Cancel</h2><p>WhatsApp <strong>'+c.phone+'</strong> or email <strong>'+c.email+'</strong>. Written request mandatory.</p>'+
  '<h2>4. Refund Processing</h2><p>Refunds processed within <strong>7 working days</strong> to the original payment method.</p>'+
  '<h2>5. Cancellation by the Company</h2><p>If the Company cancels (natural calamity, force majeure, breakdown), passengers receive a <strong>full refund</strong> or free rescheduling.</p>'+
  '<h2>6. Rescheduling</h2><p>One free rescheduling up to 6 hours before departure. Subsequent: ₹50 per seat.</p>'+
  '<div class="policy-highlight">Disputes governed by Indian law. Jurisdiction: Courts of '+c.address.city+', '+c.address.state+'.</div>';
</script>
</body></html>
