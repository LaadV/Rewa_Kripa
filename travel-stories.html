<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Travel Stories — Rewa Kripa Travels</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css"></head>
<body>
<div id="site-header"></div>
<section class="page-hero"><div class="container"><div class="page-eyebrow">Real People · Real Journeys</div><h1>Travel Stories</h1><p>Stories and reviews from passengers who travel with us every day</p></div></section>
<section class="section section-gray"><div class="container">
<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:24px;" id="stories-grid"></div>
</div></section>
<div id="site-footer"></div>
<script src="config.js"></script><script src="script.js"></script>
<script>
buildHeader('travel-stories.html'); buildFooter();
var stories = [
  { init:'R', name:'Ramesh Patel',   sub:'Barwani → Indore · Regular Commuter',   stars:5, text:'I travel to Indore every week for work. Rewa Kripa is always on time and the drivers are very professional. The USB charging port has been a lifesaver. Highly recommend!' },
  { init:'S', name:'Sunita Devi',    sub:'Char Dham Yatra 2025 Traveller',          stars:5, text:'We went on the Char Dham Yatra with Rewa Kripa. The arrangements were excellent — good hotels, hot meals, and a very knowledgeable guide. At 60 years old, I felt completely safe.' },
  { init:'A', name:'Amit Sharma',    sub:'Manali Trip Traveller',                   stars:5, text:'The Manali trip was absolutely amazing. The bus was super comfortable for the long journey. Solang Valley was the highlight. Great value at ' + formatINR(5500) + ' for 5 days.' },
  { init:'P', name:'Priya Verma',    sub:'Indore → Barwani · Student',             stars:5, text:'As a student travelling alone, I feel safe on Rewa Kripa buses. The bus is clean, the staff is helpful. I book my tickets on WhatsApp directly — super easy!' },
  { init:'M', name:'Mahesh Kale',    sub:'Shirdi Yatra Group Leader',              stars:5, text:'I organized a group of 30 people for the Shirdi Yatra. They handled everything — bus, hotel, food, and temple arrangements. Everyone was very happy. Will book again!' },
  { init:'K', name:'Kavita Jadhav',  sub:'Goa Weekend Trip',                       stars:5, text:'The Goa trip was a dream! Rewa Kripa took care of everything. The bus was very comfortable for the overnight journey. The hotel was right near the beach. Loved it!' }
];
document.getElementById('stories-grid').innerHTML = stories.map(function(s){
  var stars = Array(s.stars).fill('⭐').join('');
  return '<div style="background:white;border-radius:14px;padding:28px;border:1px solid #e5e7eb;box-shadow:0 2px 12px rgba(0,0,0,.06);">'+
    '<div style="display:flex;gap:12px;align-items:center;margin-bottom:16px;">'+
      '<div style="width:48px;height:48px;border-radius:50%;background:#012738;color:#7EC8C9;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;flex-shrink:0;">'+s.init+'</div>'+
      '<div><strong style="font-size:15px;color:#0f172a;">'+s.name+'</strong><p style="font-size:12px;color:#94a3b8;margin:0;">'+s.sub+'</p></div>'+
    '</div>'+
    '<p style="font-size:14px;color:#64748b;line-height:1.8;margin-bottom:14px;">'+'"'+s.text+'"'+'</p>'+
    '<div style="color:#f59e0b;font-size:14px;">'+stars+'</div>'+
  '</div>';
}).join('') +
'<div style="background:#012738;border-radius:14px;padding:28px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:16px;">'+
  '<div style="font-size:40px;">✍️</div>'+
  '<h3 style="color:white;font-size:18px;">Share Your Story</h3>'+
  '<p style="color:rgba(255,255,255,.5);font-size:14px;line-height:1.7;">Travelled with us? Share your experience!</p>'+
  '<a href="https://wa.me/'+CONFIG.company.whatsapp+'?text=Hi%2C+I+want+to+share+my+travel+story+with+Rewa+Kripa+Travels!" target="_blank" class="btn-primary">Share on WhatsApp</a>'+
'</div>';
</script>
</body></html>
